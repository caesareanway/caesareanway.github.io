<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">Close</span>
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous photo">&#8249;</button>
  <img src="" alt="" id="lightbox-img">
  <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next photo">&#8250;</button>
</div>

<script>
  // ── Lightbox ──────────────────────────────────────────────
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lightbox-img');
  const lbClose   = document.getElementById('lightbox-close');
  const lbPrev    = document.getElementById('lightbox-prev');
  const lbNext    = document.getElementById('lightbox-next');

  // Build ordered photo list from the grid
  const photos = Array.from(document.querySelectorAll('.photo-item')).map(el => el.dataset.src);
  let currentIndex = 0;

  function updateNav() {
    lbPrev.hidden = currentIndex === 0;
    lbNext.hidden = currentIndex === photos.length - 1;
  }

  function openLightbox(index) {
    currentIndex = index;
    lbImg.src = photos[currentIndex];
    lbImg.style.opacity = '1';
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateNav();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  function navigate(delta) {
    const next = currentIndex + delta;
    if (next < 0 || next >= photos.length) return;
    currentIndex = next;
    lbImg.style.opacity = '0';
    setTimeout(() => {
      lbImg.src = photos[currentIndex];
      lbImg.style.opacity = '1';
      updateNav();
    }, 120);
  }

  // Open on grid click
  document.querySelectorAll('.photo-item').forEach((item, i) => {
    item.addEventListener('click', () => openLightbox(i));
  });

  // Nav buttons — stop propagation so background-click-to-close doesn't fire
  lbPrev.addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
  lbNext.addEventListener('click', e => { e.stopPropagation(); navigate(1); });

  // Close on background or close button
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  // Keyboard: arrows + escape
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   navigate(-1);
    if (e.key === 'ArrowRight')  navigate(1);
  });

  // Touch swipe (mobile)
  let touchStartX = 0;

  lightbox.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  lightbox.addEventListener('touchend', e => {
    const delta = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(delta) > 50) navigate(delta > 0 ? 1 : -1);
  }, { passive: true });
</script>
