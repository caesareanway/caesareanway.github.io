<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAESAREAN — Inventory</title>

  <!-- iPhone home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CAESAREAN">
  <link rel="apple-touch-icon" href="assets/images/head_icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }

    /* Login */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 1000;
    }
    .login-screen.hidden { display: none; }
    .login-box {
      width: 100%;
      max-width: 320px;
      border: 1px solid #1c1c1c;
      padding: 40px 30px;
    }
    .login-box h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #f0f0f0;
      padding: 12px;
      font-size: 1rem;
      margin-bottom: 12px;
      font-family: 'Inter', sans-serif;
    }
    .login-box input:focus { outline: none; border-color: #555; }
    .login-box button {
      width: 100%;
      background: #c00000;
      border: none;
      color: #f0f0f0;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .login-box button:hover { background: #a00000; }
    .login-box button:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      color: #c00000;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* App */
    .app-screen { display: none; }
    .app-screen.visible { display: block; }

    header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.08em;
    }
    .subtitle { color: #666; font-size: 0.85rem; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid #1c1c1c;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: 'Inter', sans-serif;
    }
    .tab-btn.active { color: #f0f0f0; border-bottom-color: #c00000; }
    .tab-btn:hover { color: #ccc; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Orders */
    .order-card {
      background: #111;
      border: 1px solid #1c1c1c;
      padding: 16px;
      margin-bottom: 12px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }
    .order-number {
      font-weight: 600;
      color: #f0f0f0;
    }
    .order-customer {
      color: #999;
      font-size: 0.9rem;
    }
    .order-address {
      background: #0a0a0a;
      padding: 12px;
      margin: 12px 0;
      border-left: 2px solid #333;
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.5;
      font-family: 'Courier New', monospace;
    }
    .order-items {
      font-size: 0.9rem;
      color: #ccc;
      margin: 8px 0;
    }
    .order-weight {
      color: #999;
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .order-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .mark-shipped-btn {
      background: #1c5a1c;
      border: 1px solid #2a7a2a;
      color: #5dd95d;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    .mark-shipped-btn:hover { background: #2a7a2a; }
    .copy-address-btn {
      background: #1c1c1c;
      border: 1px solid #333;
      color: #999;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .copy-address-btn:hover { background: #333; color: #f0f0f0; }

    .no-orders {
      background: #111;
      border: 1px solid #1c1c1c;
      padding: 24px;
      text-align: center;
      color: #666;
    }

    /* Audit Log */
    .audit-log-section {
      margin-top: 40px;
      border-top: 1px solid #1c1c1c;
      padding-top: 24px;
    }
    .audit-log-title {
      font-weight: 600;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    .audit-entry {
      background: #111;
      border: 1px solid #1c1c1c;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .audit-product { font-weight: 600; color: #f0f0f0; }
    .audit-change { color: #5dd95d; }
    .audit-reason { color: #999; font-size: 0.8rem; }
    .audit-time { color: #666; font-size: 0.75rem; }
    .no-changes { color: #666; text-align: center; padding: 20px; }

    .status {
      background: #1c1c1c;
      border: 1px solid #333;
      padding: 10px 16px;
      font-size: 0.85rem;
      margin-bottom: 24px;
      color: #888;
    }
    .status.synced { color: #5dd95d; border-color: #2a5a2a; }
    .status.syncing { color: #f0c040; border-color: #5a4a10; }
    .status.error { color: #c00000; border-color: #5a1010; }

    .product-card {
      background: #111;
      border: 1px solid #1c1c1c;
      padding: 20px;
      margin-bottom: 12px;
    }
    .product-name { font-weight: 600; margin-bottom: 12px; }
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .quantity-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      line-height: 1;
      min-width: 60px;
    }
    .quantity-number.low { color: #c00000; }
    .controls { display: flex; gap: 8px; }
    .controls button {
      background: #1c1c1c;
      border: 1px solid #333;
      color: #f0f0f0;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .controls button:hover { background: #333; }
    .controls button.subtract { color: #ff6666; }
    .controls button.subtract:hover { background: #3a1010; border-color: #c00000; }
    .controls button.add { color: #5dd95d; }
    .controls button.add:hover { background: #102a10; border-color: #5dd95d; }
    .controls button:disabled { opacity: 0.3; cursor: not-allowed; }
    .last-updated { font-size: 0.75rem; color: #444; margin-top: 8px; }

    .footer-actions { margin-top: 32px; display: flex; flex-direction: column; gap: 10px; }
    .logout-btn {
      width: 100%;
      background: #1c1c1c;
      border: 1px solid #333;
      color: #888;
      padding: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }
    .logout-btn:hover { background: #333; color: #f0f0f0; }
    .last-sync { text-align: center; color: #333; font-size: 0.75rem; margin-top: 16px; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Inventory</h2>
    <input type="password" id="passwordInput" placeholder="Enter passphrase" autocomplete="current-password">
    <button id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div class="app-screen" id="appScreen">
  <div class="container">
    <header>
      <h1>CAESAREAN</h1>
      <p class="subtitle">Drummer Dashboard</p>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('inventory')">Inventory</button>
      <button class="tab-btn" onclick="switchTab('shipping')">Shipping</button>
    </div>

    <!-- Inventory Tab -->
    <div id="inventory" class="tab-content active">
      <div class="status" id="status">Connecting...</div>
      <div id="inventoryGrid"></div>
      <div class="audit-log-section">
        <div class="audit-log-title">Recent Changes</div>
        <div id="auditLog"></div>
      </div>

      <div class="manual-log-section" style="margin-top: 32px; padding-top: 20px; border-top: 1px solid #1c1c1c;">
        <div class="audit-log-title">Log Manual Adjustment</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
          <input type="text" id="logProduct" placeholder="SKU (e.g., cd)" style="background: #111; border: 1px solid #333; color: #f0f0f0; padding: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem;">
          <input type="number" id="logQty" placeholder="New quantity" style="background: #111; border: 1px solid #333; color: #f0f0f0; padding: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem;">
          <input type="text" id="logReason" placeholder="Reason (e.g., Sold at show)" style="background: #111; border: 1px solid #333; color: #f0f0f0; padding: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; grid-column: 1 / -1;">
        </div>
        <button onclick="submitManualLog()" style="width: 100%; background: #c00000; border: none; color: #f0f0f0; padding: 10px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Log Adjustment</button>
      </div>
    </div>

    <!-- Shipping Tab -->
    <div id="shipping" class="tab-content">
      <div class="status" id="statusShipping">Loading orders...</div>
      <div id="ordersGrid"></div>
    </div>

    <div class="footer-actions">
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
    <div class="last-sync">Last synced: <span id="lastSynced">—</span></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://hgrhtrwgrauwjguahvjv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhncmh0cndncmF1d2pndWFodmp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzk4MDgsImV4cCI6MjA5MDg1NTgwOH0.0ywVMVVYqwQxehNDFRsPs2PYRVBrndZxz6ZnYl6g1b0';

  // ── Session management (localStorage, 2-year expiry) ──────────
  const SESSION_KEY = 'inv_session';
  const TWO_YEARS_MS = 2 * 365 * 24 * 60 * 60 * 1000;

  function isSessionValid() {
    try {
      const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
      return session && session.token && session.expiresAt > Date.now();
    } catch {
      return false;
    }
  }

  function saveSession(token) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      token,
      expiresAt: Date.now() + TWO_YEARS_MS
    }));
  }

  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
  }

  // ── Auth ──────────────────────────────────────────────────────
  async function handleLogin() {
    const passphrase = document.getElementById('passwordInput').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');

    if (!passphrase) return;

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errorEl.textContent = '';

    try {
      const res = await fetch('/.netlify/functions/validate-passphrase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase })
      });

      const data = await res.json();

      if (data.success) {
        saveSession(data.token);
        showApp();
      } else {
        btn.textContent = 'Sign In';
        btn.disabled = false;
        errorEl.textContent = 'Incorrect passphrase';
        document.getElementById('passwordInput').value = '';
      }
    } catch (err) {
      btn.textContent = 'Sign In';
      btn.disabled = false;
      errorEl.textContent = 'Connection error. Try again.';
    }
  }

  function handleLogout() {
    clearSession();
    location.reload();
  }

  function showApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.add('visible');
    initializeApp();
  }

  // ── Supabase ──────────────────────────────────────────────────
  let supabase = null;
  let inventory = {};

  async function initSupabase() {
    if (supabase) return supabase;
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return supabase;
  }

  async function initializeApp() {
    setStatus('Connecting to Supabase...', 'syncing');
    try {
      await initSupabase();
      await loadInventory();
      await loadAuditLog();
      subscribeToChanges();
      setStatus('Connected', 'synced');
    } catch (err) {
      setStatus('Connection error: ' + err.message, 'error');
    }
  }

  async function loadInventory() {
    const { data, error } = await supabase
      .from('inventory')
      .select('product, quantity')
      .order('product');
    if (error) throw error;
    inventory = {};
    data.forEach(row => { inventory[row.product] = row.quantity; });
    renderInventory();
    updateLastSynced();
  }

  function subscribeToChanges() {
    supabase.channel('inventory_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, payload => {
        if (payload.new) {
          inventory[payload.new.product] = payload.new.quantity;
          renderInventory();
          updateLastSynced();
        }
      })
      .subscribe();
  }

  const PRODUCTS = [
    { id: 'cd',              label: 'CD — Wretched Decrepitude' },
    { id: 'head-shirt-XL',   label: 'Head T-Shirt — XL' },
    { id: 'head-shirt-2XL',  label: 'Head T-Shirt — 2XL' },
    { id: 'head-shirt-3XL',  label: 'Head T-Shirt — 3XL' },
    { id: 'eagle-shirt-S',   label: 'Eagle T-Shirt — S' },
    { id: 'eagle-shirt-M',   label: 'Eagle T-Shirt — M' },
    { id: 'eagle-shirt-L',   label: 'Eagle T-Shirt — L' },
    { id: 'eagle-shirt-XL',  label: 'Eagle T-Shirt — XL' },
    { id: 'eagle-shirt-XXL', label: 'Eagle T-Shirt — XXL' },
    { id: 'eagle-shirt-XXXL', label: 'Eagle T-Shirt — XXXL' },
  ];

  function renderInventory() {
    const grid = document.getElementById('inventoryGrid');
    grid.innerHTML = '';
    PRODUCTS.forEach(p => {
      const qty = inventory[p.id] !== undefined ? inventory[p.id] : '?';
      const isLow = typeof qty === 'number' && qty < 3;
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML =
        '<div class="product-name">' + p.label + '</div>' +
        '<div class="quantity-row">' +
          '<div class="quantity-number' + (isLow ? ' low' : '') + '">' + qty + '</div>' +
          '<div class="controls">' +
            '<button class="subtract" onclick="updateInventory(\'' + p.id + '\', -1)" ' + (qty <= 0 ? 'disabled' : '') + '>&#8722;</button>' +
            '<button class="add" onclick="updateInventory(\'' + p.id + '\', 1)">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="last-updated" id="ts-' + p.id + '"></div>';
      grid.appendChild(card);
    });
  }

  async function updateInventory(product, delta) {
    const current = inventory[product] || 0;
    const newQty = Math.max(0, current + delta);
    setStatus('Saving...', 'syncing');
    try {
      const { error: updateError } = await supabase
        .from('inventory')
        .update({ quantity: newQty, updated_at: new Date().toISOString() })
        .eq('product', product);

      if (updateError) throw updateError;

      const { data: fetchedData, error: fetchError } = await supabase
        .from('inventory')
        .select('quantity')
        .eq('product', product)
        .single();

      if (fetchError) throw fetchError;

      const confirmedQty = fetchedData?.quantity !== undefined ? fetchedData.quantity : newQty;
      inventory[product] = confirmedQty;

      console.log(`✓ Updated ${product}: ${confirmedQty}`);

      // Log to audit_log
      await logInventoryChange(product, current, confirmedQty, 'Manual adjustment');

      renderInventory();
      await loadAuditLog();
      const ts = document.getElementById('ts-' + product);
      if (ts) ts.textContent = 'Updated ' + new Date().toLocaleTimeString();
      setStatus('Saved', 'synced');
    } catch (err) {
      console.error(`✗ Failed to update ${product}:`, err);
      setStatus('Save failed: ' + err.message, 'error');
    }
  }

  async function logInventoryChange(product, prevQty, newQty, reason) {
    try {
      const { error } = await supabase
        .from('audit_log')
        .insert([{
          product: product,
          previous_qty: prevQty,
          new_qty: newQty,
          reason: reason,
          timestamp: new Date().toISOString(),
        }]);

      if (error) console.error('Failed to log inventory change:', error);
    } catch (err) {
      console.error('Error logging inventory change:', err);
    }
  }

  async function loadAuditLog() {
    try {
      const { data, error } = await supabase
        .from('audit_log')
        .select('*')
        .order('timestamp', { ascending: false })
        .limit(20);

      if (error) throw error;
      renderAuditLog(data || []);
    } catch (err) {
      console.error('Failed to load audit log:', err);
    }
  }

  function renderAuditLog(entries) {
    const logEl = document.getElementById('auditLog');
    if (!logEl) return;

    if (entries.length === 0) {
      logEl.innerHTML = '<div class="no-changes">No changes yet</div>';
      return;
    }

    logEl.innerHTML = entries.map(entry => {
      const time = new Date(entry.timestamp).toLocaleString();
      const arrow = entry.previous_qty > entry.new_qty ? '↓' : '↑';
      return `
        <div class="audit-entry">
          <div class="audit-product">${entry.product}</div>
          <div class="audit-change">${entry.previous_qty} ${arrow} ${entry.new_qty}</div>
          <div class="audit-reason">${entry.reason}</div>
          <div class="audit-time">${time}</div>
        </div>
      `;
    }).join('');
  }

  function setStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + (type || '');
  }

  function updateLastSynced() {
    document.getElementById('lastSynced').textContent = new Date().toLocaleTimeString();
  }

  async function submitManualLog() {
    const product = document.getElementById('logProduct').value.trim();
    const newQty = parseInt(document.getElementById('logQty').value);
    const reason = document.getElementById('logReason').value.trim();

    if (!product || isNaN(newQty) || !reason) {
      alert('Please fill in all fields');
      return;
    }

    try {
      // Get current inventory
      const { data: current, error: fetchErr } = await supabase
        .from('inventory')
        .select('quantity')
        .eq('product', product)
        .single();

      if (fetchErr) throw new Error(`Product not found: ${product}`);
      if (!current) throw new Error(`No record for ${product}`);

      const oldQty = current.quantity;

      // Update inventory
      const { error: updateErr } = await supabase
        .from('inventory')
        .update({ quantity: newQty, updated_at: new Date().toISOString() })
        .eq('product', product);

      if (updateErr) throw updateErr;

      // Log to audit_log
      const { error: logErr } = await supabase
        .from('audit_log')
        .insert([{
          product,
          previous_qty: oldQty,
          new_qty: newQty,
          reason: reason,
          timestamp: new Date().toISOString()
        }]);

      if (logErr) throw logErr;

      // Refresh UI
      await loadInventory();
      await loadAuditLog();

      // Clear form
      document.getElementById('logProduct').value = '';
      document.getElementById('logQty').value = '';
      document.getElementById('logReason').value = '';
      setStatus('✓ Adjustment logged', 'synced');
    } catch (err) {
      setStatus('✗ Error: ' + err.message, 'error');
    }
  }

  // ── Tabs ───────────────────────────────────────────────────────
  function switchTab(tab) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    // Show selected tab
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');

    // Load shipping data if switching to shipping
    if (tab === 'shipping') {
      loadOrders();
    }
  }

  // ── Shipping ───────────────────────────────────────────────────
  let orders = [];

  async function loadOrders() {
    setStatusShipping('Loading orders...', 'syncing');
    try {
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .neq('status', 'shipped')
        .order('created_at', { ascending: true });

      if (error) throw error;

      orders = data || [];
      renderOrders();
      subscribeToOrderChanges();
      setStatusShipping(orders.length + ' pending order' + (orders.length !== 1 ? 's' : ''), 'synced');
    } catch (err) {
      console.error('Failed to load orders:', err);
      setStatusShipping('Failed to load orders: ' + err.message, 'error');
    }
  }

  function renderOrders() {
    const grid = document.getElementById('ordersGrid');
    grid.innerHTML = '';

    if (orders.length === 0) {
      grid.innerHTML = '<div class="no-orders">No pending orders</div>';
      return;
    }

    orders.forEach(order => {
      const card = document.createElement('div');
      card.className = 'order-card';

      // Format address
      const addr = order.shipping_address || {};
      const addressText = [
        addr.line1,
        addr.line2,
        `${addr.city}, ${addr.state} ${addr.postal_code}`,
        addr.country
      ].filter(Boolean).join('\n');

      // Format items
      const items = (order.items || []).map(item =>
        `${item.qty}x ${item.name || item.sku}`
      ).join(', ');

      // Calculate weight (cd: 0.5 oz, shirt: 0.3 oz)
      let weight = 0;
      (order.items || []).forEach(item => {
        if (item.sku.includes('cd')) weight += 0.5 * item.qty;
        else if (item.sku.includes('shirt')) weight += 0.3 * item.qty;
      });

      // Format all order info for copying
      const fullOrderInfo = `${order.customer_name}
${addressText}

Items: ${items}
Weight: ${weight.toFixed(1)} oz`;

      card.innerHTML = `
        <div class="order-header">
          <div>
            <div class="order-number">${order.order_number || 'N/A'}</div>
            <div class="order-customer">${order.customer_name || 'Unknown'}</div>
          </div>
          <div style="color: #666; font-size: 0.8rem;">${order.country || 'US'}</div>
        </div>
        <div class="order-address">${addressText.replace(/\n/g, '<br>')}</div>
        <div class="order-items"><strong>Items:</strong> ${items}</div>
        <div class="order-weight"><strong>Weight:</strong> ${weight.toFixed(1)} oz</div>
        <div class="order-actions">
          <button class="copy-address-btn" onclick="copyToClipboard('${encodeURIComponent(fullOrderInfo)}')">Copy All</button>
          <button class="mark-shipped-btn" onclick="markAsShipped('${order.id}')">✓ Shipped</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function subscribeToOrderChanges() {
    supabase.channel('orders_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
        loadOrders();
      })
      .subscribe();
  }

  async function markAsShipped(orderId) {
    try {
      const { error } = await supabase
        .from('orders')
        .update({ status: 'shipped', updated_at: new Date().toISOString() })
        .eq('id', orderId);

      if (error) throw error;

      console.log('✓ Marked order as shipped:', orderId);
      loadOrders();
    } catch (err) {
      console.error('Failed to mark order as shipped:', err);
      alert('Error: ' + err.message);
    }
  }

  function copyToClipboard(encoded) {
    const text = decodeURIComponent(encoded);
    navigator.clipboard.writeText(text).then(() => {
      alert('Address copied!');
    }).catch(() => {
      alert('Failed to copy');
    });
  }

  function setStatusShipping(text, type) {
    const el = document.getElementById('statusShipping');
    if (el) {
      el.textContent = text;
      el.className = 'status ' + (type || '');
    }
  }

  // ── Event listeners ───────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // ── Boot: skip login if valid session exists ──────────────────
  if (isSessionValid()) {
    showApp();
  }
</script>
</body>
</html>
