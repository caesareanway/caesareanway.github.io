<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CAESAREAN — Order confirmed preview.">
  <title>CAESAREAN — Order Confirmed (PREVIEW)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .success-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 80px;
    }

    .success-inner {
      max-width: 480px;
      text-align: center;
    }

    .success-mark {
      font-size: 2rem;
      margin-bottom: 28px;
      opacity: 0.5;
    }

    .success-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 0.92;
      color: #fff;
      margin-bottom: 20px;
    }

    .success-body {
      font-size: 15px;
      color: #999;
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .order-details {
      background: rgba(0,0,0,0.3);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 24px;
      margin: 40px 0;
      text-align: center;
    }

    .order-detail-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .order-label {
      color: #999;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .order-value {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 0.05em;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      padding: 12px 16px;
      border-radius: 4px;
      max-width: 100%;
      overflow-wrap: break-word;
    }

    .copy-button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      text-decoration: underline;
      font-weight: 600;
    }

    .copy-button:hover {
      opacity: 0.7;
    }

    .success-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .success-link {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #999;
      border-bottom: 1px solid #333;
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .success-link:hover {
      color: #fff;
      border-color: #999;
    }

    .success-link.primary {
      color: #e74c3c;
      border-color: #e74c3c;
    }

    .success-link.primary:hover { opacity: 0.75; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>

<div class="success-page">
  <div class="success-inner">
    <div class="success-mark">✦</div>
    <h1 class="success-heading">Order Confirmed</h1>
    <p class="success-body">
      Your order has been placed.
      <br><br>
      Save your Order ID below for your records.<br>
      Expected delivery: 5–7 business days.
    </p>

    <div class="order-details" id="orderDetails">
      <div class="order-detail-row">
        <span class="order-label">Order Number</span>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%;">
          <span class="order-value" id="orderId" style="cursor: pointer;">ORD-8H9I0J</span>
          <button class="copy-button" onclick="copyOrderId()">copy order number</button>
        </div>
      </div>
    </div>

    <p class="success-body" style="margin-top: 30px; margin-bottom: 20px;">
      <strong>Want tracking info?</strong><br>
      <a href="mailto:contact.caesarean@gmail.com" style="color: #e74c3c; text-decoration: underline;">Email us</a> with your Order ID and we'll provide tracking details once your order ships.
    </p>

    <div class="success-links">
      <a href="#" class="success-link primary">Back to Store</a>
      <a href="#" class="success-link">Music</a>
      <a href="#" class="success-link">Instagram ↗</a>
    </div>
  </div>
</div>

<script>
  function copyOrderId() {
    const orderId = 'ORD-8H9I0J';
    navigator.clipboard.writeText(orderId).then(() => {
      event.target.textContent = '✓ copied!';
      setTimeout(() => {
        event.target.textContent = 'copy order number';
      }, 2000);
    });
  }
</script>

</body>
</html>
