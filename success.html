  <style>
    .success-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--nav-h) var(--gutter) 80px;
    }

    .success-inner {
      max-width: 480px;
      text-align: center;
    }

    .success-mark {
      font-size: 2rem;
      margin-bottom: 28px;
      opacity: 0.5;
    }

    .success-heading {
      font-family: var(--display);
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 0.92;
      color: var(--fg);
      margin-bottom: 20px;
    }

    .success-body {
      font-size: 15px;
      color: var(--fg-dim);
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .success-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .success-link {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .success-link:hover {
      color: var(--fg);
      border-color: var(--fg-dim);
    }

    .success-link.primary {
      color: var(--red);
      border-color: var(--red);
    }

    .success-link.primary:hover { opacity: 0.75; }
  </style>
</head>
