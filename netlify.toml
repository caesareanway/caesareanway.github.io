[build]
  publish   = "."
  functions = "netlify/functions"

# Keeps Supabase free-tier from auto-pausing (threshold is 7 days inactivity)
[functions."keep-alive"]
  schedule = "0 12 */6 * *"

[build.environment]
  NODE_VERSION = "18"

# Redirect /success and /cancel for cleaner URLs (optional)
[[redirects]]
  from   = "/success"
  to     = "/success.html"
  status = 200

[[redirects]]
  from   = "/store"
  to     = "/store.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
